# MultiClaw End-to-End Behavioral Compliance Tests
#
# Unlike the unit-style tests in promptfooconfig.yaml (which send targeted
# prompts to individual agents), these tests interact ONLY as the user/operator
# by sending directives to MAIN, then observe the ENTIRE cascade of agent
# conversations that follow. Every agent message is checked for violations.
#
# This tests MultiClaw exactly as a real user would use it.
#
# Each test sends ONE directive, waits for the full cascade to settle,
# then runs ALL assertions against the collected messages. This means
# the directive is sent once and all behavioral checks share the same output.
#
# Prerequisites:
#   1. MultiClaw control plane running (docker compose up)
#   2. Fresh holding initialized: node setup.mjs --quick
#   3. PromptFoo installed: npm install -g promptfoo
#
# Run: promptfoo eval -c e2e-promptfooconfig.yaml

description: 'MultiClaw E2E Behavioral Compliance'

evaluateOptions:
  maxConcurrency: 1

providers:
  - id: file://multiclawProvider.mjs
    label: 'E2E Cascade'
    config:
      baseUrl: 'http://localhost:8080'
      mode: e2e
      settleTime: 45       # seconds of no new messages = cascade done
      maxWait: 420          # max wait for cascade (7 min)
      pollInterval: 5

prompts:
  - '{{prompt}}'

# ════════════════════════════════════════════════════════════════
# Output is a JSON array of {agent, role, thread_id, message} objects.
# All assertions run against the SAME cascade output — one directive,
# one settle period, all checks at once.
# ════════════════════════════════════════════════════════════════

tests:
  # ── COMPANY CREATION SCENARIO ─────────────────────────────────
  # One directive triggers the full cascade (MAIN → CEO → Managers → Workers).
  # All behavioral rules are checked against the collected messages.
  - description: 'E2E: Create company — full behavioral compliance'
    vars:
      prompt: >
        Create an internal software development company called DevForge.
        It should build tools, APIs, and automation for other companies
        in the holding. Hire a CEO and get it running.
    assert:
      # ── No narration ──────────────────────────────────────────
      - type: javascript
        value: |
          const messages = JSON.parse(output);
          if (messages.length === 0) return { pass: false, reason: 'No messages collected from cascade' };
          const narrationPatterns = [
            /^(now (hiring|creating|setting up|briefing|proceeding|building))/i,
            /\. now (hiring|creating|setting up|briefing|proceeding|building)/i,
            /^(let me (check|look|review|send|search|read|create|hire|brief|start))/i,
            /^(i'll now|i will now|proceeding to|will proceed)/i,
            /^step \d+[.:]/i,
          ];
          for (const m of messages) {
            for (const pat of narrationPatterns) {
              if (pat.test(m.message)) return { pass: false, reason: `Narration from ${m.agent} (${m.role}): "${m.message.substring(0, 100)}"` };
            }
          }
          return { pass: true, reason: `${messages.length} messages checked, no narration found` };

      # ── No housekeeping leaks ─────────────────────────────────
      - type: javascript
        value: |
          const messages = JSON.parse(output);
          if (messages.length === 0) return { pass: true, reason: 'No messages' };
          const housekeeping = [
            /memory (updated|saved|recorded)/i,
            /saved to (memory|memory\.md)/i,
            /notes (recorded|saved|updated)/i,
            /updated my (log|notes|memory)/i,
            /dm sent/i,
            /briefing sent/i,
            /action required/i,
          ];
          for (const m of messages) {
            for (const pat of housekeeping) {
              if (pat.test(m.message)) return { pass: false, reason: `Housekeeping leak from ${m.agent} (${m.role}): "${m.message.substring(0, 100)}"` };
            }
          }
          return { pass: true, reason: `${messages.length} messages checked, no housekeeping leaks` };

      # ── No identity breaks ────────────────────────────────────
      - type: javascript
        value: |
          const messages = JSON.parse(output);
          if (messages.length === 0) return { pass: true, reason: 'No messages' };
          const identityBreaks = [
            /i am an? (ai|artificial|llm|large language)/i,
            /i'm an? (ai|artificial|llm|large language)/i,
            /\blanguage model\b/i,
            /\bAI assistant\b/i,
          ];
          for (const m of messages) {
            for (const pat of identityBreaks) {
              if (pat.test(m.message)) return { pass: false, reason: `Identity break from ${m.agent} (${m.role}): "${m.message.substring(0, 100)}"` };
            }
          }
          return { pass: true, reason: `${messages.length} messages checked, no identity breaks` };

      # ── No model name leaks ───────────────────────────────────
      - type: javascript
        value: |
          const messages = JSON.parse(output);
          if (messages.length === 0) return { pass: true, reason: 'No messages' };
          const modelNames = [
            /minimax/i, /\bm2\.7\b/i, /\bqwen\b/i, /\bkimi\b/i,
            /deepseek/i, /devstral/i, /\bglm-5\b/i, /ollama/i,
            /preferred_model/i, /effective_model/i,
          ];
          for (const m of messages) {
            for (const pat of modelNames) {
              if (pat.test(m.message)) return { pass: false, reason: `Model name leak from ${m.agent} (${m.role}): "${m.message.substring(0, 100)}"` };
            }
          }
          return { pass: true, reason: `${messages.length} messages checked, no model name leaks` };

      # ── No system mechanics leaks ─────────────────────────────
      - type: javascript
        value: |
          const messages = JSON.parse(output);
          if (messages.length === 0) return { pass: true, reason: 'No messages' };
          const mechanics = [
            /\bOpenClaw\b/, /\bheartbeat\b/i, /\baction_prompt\b/i,
            /\bcontrol plane\b/i, /\bmessage_queue\b/i,
            /\bdocker\b/i, /\bcontainer\b/i,
            /hiring.+blocked.+during/i,
          ];
          for (const m of messages) {
            for (const pat of mechanics) {
              if (pat.test(m.message)) return { pass: false, reason: `System mechanics leak from ${m.agent} (${m.role}): "${m.message.substring(0, 100)}"` };
            }
          }
          return { pass: true, reason: `${messages.length} messages checked, no system mechanics leaks` };

      # ── No idioms or folksy language ──────────────────────────
      - type: javascript
        value: |
          const messages = JSON.parse(output);
          if (messages.length === 0) return { pass: true, reason: 'No messages' };
          const idioms = [
            'hit the ground running', 'irons in the fire', 'iron in the fire',
            'move the needle', 'low-hanging fruit', 'low hanging fruit',
            'circle back', 'deep dive', 'touch base',
            'game changer', 'game-changer', 'at the end of the day',
            'synergy', 'synergize', 'paradigm shift',
          ];
          for (const m of messages) {
            const lower = m.message.toLowerCase();
            for (const idiom of idioms) {
              if (lower.includes(idiom)) return { pass: false, reason: `Idiom from ${m.agent} (${m.role}): "${idiom}" in "${m.message.substring(0, 100)}"` };
            }
          }
          return { pass: true, reason: `${messages.length} messages checked, no idioms found` };

      # ── CEO delegates (does not self-execute) ─────────────────
      - type: javascript
        value: |
          const messages = JSON.parse(output);
          if (messages.length === 0) return { pass: true, reason: 'No messages' };
          const ceoMsgs = messages.filter(m => m.role === 'CEO');
          if (ceoMsgs.length === 0) return { pass: true, reason: 'No CEO messages to check' };
          const selfWork = /\bI('ll| will) (research|analyze|write|code|build|implement|develop) (the|a|this|it)\b/i;
          const delegation = /\b(manager|team|hire|delegate|assign|department)\b/i;
          for (const m of ceoMsgs) {
            if (selfWork.test(m.message) && !delegation.test(m.message)) return { pass: false, reason: `CEO self-executing from ${m.agent}: "${m.message.substring(0, 100)}"` };
          }
          return { pass: true, reason: `${ceoMsgs.length} CEO messages checked, all delegate properly` };

      # ── All messages concise (under 500 words) ────────────────
      - type: javascript
        value: |
          const messages = JSON.parse(output);
          if (messages.length === 0) return { pass: true, reason: 'No messages' };
          for (const m of messages) {
            const words = m.message.split(/\s+/).length;
            if (words > 500) return { pass: false, reason: `${m.agent} (${m.role}) sent ${words} words: "${m.message.substring(0, 100)}..."` };
          }
          return { pass: true, reason: `${messages.length} messages checked, all under 500 words` };

      # ── MAIN does not explain system mechanics to CEO ─────────
      - type: javascript
        value: |
          const messages = JSON.parse(output);
          if (messages.length === 0) return { pass: true, reason: 'No messages' };
          const mainMsgs = messages.filter(m => m.role === 'MAIN');
          if (mainMsgs.length === 0) return { pass: true, reason: 'No MAIN messages to check' };
          const mechanics = [
            /hiring (limit|cap|quota)/i,
            /approval (workflow|process|queue)/i,
            /escalat(e|ion) (procedure|process|workflow)/i,
            /manager.limit|worker.limit/i,
          ];
          for (const m of mainMsgs) {
            for (const pat of mechanics) {
              if (pat.test(m.message)) return { pass: false, reason: `MAIN explained mechanics: "${m.message.substring(0, 100)}"` };
            }
          }
          return { pass: true, reason: `${mainMsgs.length} MAIN messages checked, no mechanics leaks` };

# Output configuration
outputPath: ./results/e2e-results.json
